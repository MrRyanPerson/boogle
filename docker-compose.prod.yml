name: boogle

services:
  app:
    container_name: web-ui
    image: ghcr.io/mrryanperson/boogle:main
    volumes:
      - ./logs:/app/logs
    networks:
      - app
    ports:
      - "3000:3000"

  searxng-core:
    container_name: searxng-core
    image: docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}
    networks:
      - app
    restart: always
    ports:
      - ${SEARXNG_HOST:+${SEARXNG_HOST}:}${SEARXNG_PORT:-8080}:${SEARXNG_PORT:-8080}
    env_file: ./searxng/.env
    volumes:
      - ./searxng/core-config/:/etc/searxng/:Z
      - core-data:/var/cache/searxng/

  caddy:
    image: caddy:2-alpine
    networks:
      - app
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/prod:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config


  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    networks:
      - app
    command: valkey-server --save 30 1 --loglevel warning
    restart: always
    volumes:
      - valkey-data:/data/

volumes:
  core-data:
  valkey-data:
  caddy_data:
  caddy_config:

networks:
  app:
    # Specify driver options
    driver: bridge

